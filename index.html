<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping-Gift</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>User Info</h2>

        <div class="input-group">
            <input type="text" required>
            <label>Name</label>
        </div>

        <div class="input-group">
            <input type="number" required>
            <label>Shopping Amount</label>
        </div>

        <div class="input-group">
            <input type="number" required>
            <label>Age</label>
        </div>

        <button>Submit</button>

        <!-- HAPPY UI -->
        <div class="box happy">
            <div class="emoji">🎉</div>
            <h1>Congratulations!</h1>
            <p>You got a Gift 🎁</p>
            <button>Awesome!</button>
        </div>

        <!-- SAD UI -->
        <div class="box sad">
            <div class="emoji">😢</div>
            <h1>Sorry!</h1>
            <p>No gift this time</p>
            <button>Try Again</button>
        </div>








    </div>


    <script src="script.js"></script>
</body>

</html>
